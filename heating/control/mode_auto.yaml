# =====================================================================
# Soubor   : heating/control/mode_auto.yaml
# Modul    : Topení – řízení
# Účel     : Řídicí automatizace topného systému (režimy, watchdog, fail-safe, kotel)
# Autor    : Michal
# Poslední úprava : 2026-04-10
# Poznámka : YAML syntaxe podle HA 2024.10 (trigger / condition / action)
# =====================================================================

automation:
  # ===================================================================
  # SEKCE: Automatizace – režim AUTO
  # ===================================================================

  # -------------------------------------------------------------------
  # AUTOMATIZACE: Aktivace AUTO → zruš Boost + aplikuj rozvrhy
  # Logika:
  # - při přepnutí do režimu Auto (nebo při restartu HA)
  # - pokud je aktivní Boost → vypne jej
  # - vynuluje boost_until (pro čistý stav)
  # - aplikuje plánované rozvrhy pro všechny zóny
  # -------------------------------------------------------------------
  - alias: "Auto: aktivace a návrat k rozvrhům"
    id: heating_auto_apply_on
    description: >
      Po přepnutí do režimu Auto zruší aktivní Boost, vynuluje čas boostu
      a znovu aplikuje rozvrhy všech topných zón.
    mode: restart

    trigger:
      - trigger: state
        entity_id: input_select.topny_rezim
        to: "Auto"
      - trigger: homeassistant
        event: start

    condition:
      - condition: state
        entity_id: input_select.topny_rezim
        state: "Auto"
      - condition: state
        entity_id: input_boolean.topny_system_enable
        state: "on"

    action:
      - variables:
          boost_was_active: "{{ is_state('binary_sensor.kotel_boost_active', 'on') }}"
      # ---------------------------------------------------------------
      # 1) Zrušit Boost, pokud byl zapnutý
      # ---------------------------------------------------------------
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.boost_now
                state: "on"
            sequence:
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.boost_now

      # ---------------------------------------------------------------
      # 2) Vynulovat boost_until (pro čistý stav)
      # ---------------------------------------------------------------
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.boost_until
        data:
          datetime: "{{ now().isoformat() }}"

      # ---------------------------------------------------------------
      # 2b) Počkej na reálné vyhodnocení Boost OFF
      # Důvod: bez čekání může smart rozvrh spadnout do větve
      # "Boost aktivní – nepřepisuj", pokud se template ještě nepřepočetl.
      # ---------------------------------------------------------------
      - wait_template: "{{ is_state('binary_sensor.kotel_boost_active', 'off') }}"
        timeout: "00:00:05"
        continue_on_timeout: true

      # ---------------------------------------------------------------
      # 3) Znovu aplikovat rozvrhy ve všech zónách
      # Pozn.: pokud byl Boost aktivní, návrat po Boost OFF řeší
      #       automation.heating_boost_reapply_schedule_off.
      #       Tím se vyhneme duplicitní orchestraci.
      # ---------------------------------------------------------------
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ not boost_was_active }}"
              - condition: state
                entity_id: input_boolean.heating_central_dispatch_enable
                state: "on"
            sequence:
              - event: heating_reconcile_requested
                event_data:
                  source: heating_auto_apply_on
                  reason: mode_auto_no_boost
          - conditions:
              - condition: template
                value_template: "{{ not boost_was_active }}"
              - condition: state
                entity_id: input_boolean.heating_central_dispatch_enable
                state: "off"
            sequence:
              - action: automation.trigger
                target:
                  entity_id: >-
                    {{ states.automation
                      | selectattr('entity_id', 'search', '_bp$')
                      | map(attribute='entity_id')
                      | list }}
          - conditions:
              - condition: template
                value_template: "{{ boost_was_active }}"
            sequence:
              - action: logbook.log
                data:
                  name: "Topení – režimy"
                  message: "Auto: přeskočen přímý re-apply, čekám na trigger po Boost OFF."
                  entity_id: input_select.topny_rezim

      # ---------------------------------------------------------------
      # 4) Zapsat událost do Logbooku
      # ---------------------------------------------------------------
      - action: logbook.log
        data:
          name: "Topení – režimy"
          message: >-
            Auto → zrušen Boost, rozvrhy znovu aplikovány.
            {% if not is_state('binary_sensor.kotel_boost_active','off') %}
              Pozor: timeout při čekání na přepočet boost senzoru.
            {% endif %}
          entity_id: input_select.topny_rezim
