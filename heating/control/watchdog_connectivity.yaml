# YAML 2024.10
# =====================================================================
# Soubor   : config/heating/control/watchdog_connectivity.yaml
# Modul    : Heating – Watchdog Connectivity (hlavice)
# Účel     : Jednotná diagnostika živosti hlavic + notifikace + eskalace
# Autor    : Michal + Codex refactor
# Poslední úprava : 2026-04-07
# =====================================================================

# Parametry watchdogu:
# - alive timeout: 90 minut (hlavice musí aspoň jednou aktualizovat entitu)
# - warning: problém trvá >= 10 minut
# - periodic repeat: každých 10 minut při trvání problému
# - escalation: >= 2 unhealthy hlavice po dobu 30 minut => pouze diagnostická eskalace (bez zásahu do režimu)

template:
  - binary_sensor:
      - name: "heating_valve_sklep_michal_alive"
        unique_id: heating_valve_sklep_michal_alive
        device_class: connectivity
        state: >-
          {% set e = states['climate.sklep_michal'] %}
          {% set ts = as_timestamp(e.last_updated) if e is not none else 0 %}
          {{ states('climate.sklep_michal') not in ['unknown', 'unavailable', '']
             and (as_timestamp(now()) - ts) <= 5400 }}

      - name: "heating_valve_prizemi_michal_alive"
        unique_id: heating_valve_prizemi_michal_alive
        device_class: connectivity
        state: >-
          {% set e = states['climate.prizemi_michal'] %}
          {% set ts = as_timestamp(e.last_updated) if e is not none else 0 %}
          {{ states('climate.prizemi_michal') not in ['unknown', 'unavailable', '']
             and (as_timestamp(now()) - ts) <= 5400 }}

      - name: "heating_valve_prizemi_chodba_zachod_alive"
        unique_id: heating_valve_prizemi_chodba_zachod_alive
        device_class: connectivity
        state: >-
          {% set e = states['climate.prizemi_chodba_zachod'] %}
          {% set ts = as_timestamp(e.last_updated) if e is not none else 0 %}
          {{ states('climate.prizemi_chodba_zachod') not in ['unknown', 'unavailable', '']
             and (as_timestamp(now()) - ts) <= 5400 }}

      - name: "heating_valve_1p_jidelna_alive"
        unique_id: heating_valve_1p_jidelna_alive
        device_class: connectivity
        state: >-
          {% set e = states['climate.1p_jidelna'] %}
          {% set ts = as_timestamp(e.last_updated) if e is not none else 0 %}
          {{ states('climate.1p_jidelna') not in ['unknown', 'unavailable', '']
             and (as_timestamp(now()) - ts) <= 5400 }}

      - name: "heating_valve_1p_kuchyn_alive"
        unique_id: heating_valve_1p_kuchyn_alive
        device_class: connectivity
        state: >-
          {% set e = states['climate.1p_kuchyn'] %}
          {% set ts = as_timestamp(e.last_updated) if e is not none else 0 %}
          {{ states('climate.1p_kuchyn') not in ['unknown', 'unavailable', '']
             and (as_timestamp(now()) - ts) <= 5400 }}

      - name: "heating_valve_1p_koupelna_alive"
        unique_id: heating_valve_1p_koupelna_alive
        device_class: connectivity
        state: >-
          {% set e = states['climate.1p_koupelna'] %}
          {% set ts = as_timestamp(e.last_updated) if e is not none else 0 %}
          {{ states('climate.1p_koupelna') not in ['unknown', 'unavailable', '']
             and (as_timestamp(now()) - ts) <= 5400 }}

      - name: "heating_valve_1p_chodba_alive"
        unique_id: heating_valve_1p_chodba_alive
        device_class: connectivity
        state: >-
          {% set e = states['climate.1p_chodba'] %}
          {% set ts = as_timestamp(e.last_updated) if e is not none else 0 %}
          {{ states('climate.1p_chodba') not in ['unknown', 'unavailable', '']
             and (as_timestamp(now()) - ts) <= 5400 }}

      - name: "heating_valve_2p_mama_alive"
        unique_id: heating_valve_2p_mama_alive
        device_class: connectivity
        state: >-
          {% set e = states['climate.2p_mama'] %}
          {% set ts = as_timestamp(e.last_updated) if e is not none else 0 %}
          {{ states('climate.2p_mama') not in ['unknown', 'unavailable', '']
             and (as_timestamp(now()) - ts) <= 5400 }}

      - name: "heating_valves_all_healthy"
        unique_id: heating_valves_all_healthy
        device_class: connectivity
        state: >-
          {{ is_state('binary_sensor.heating_valve_sklep_michal_alive', 'on')
             and is_state('binary_sensor.heating_valve_prizemi_michal_alive', 'on')
             and is_state('binary_sensor.heating_valve_prizemi_chodba_zachod_alive', 'on')
             and is_state('binary_sensor.heating_valve_1p_jidelna_alive', 'on')
             and is_state('binary_sensor.heating_valve_1p_kuchyn_alive', 'on')
             and is_state('binary_sensor.heating_valve_1p_koupelna_alive', 'on')
             and is_state('binary_sensor.heating_valve_1p_chodba_alive', 'on')
             and is_state('binary_sensor.heating_valve_2p_mama_alive', 'on') }}

  - sensor:
      - name: "heating_valves_unhealthy_count"
        unique_id: heating_valves_unhealthy_count
        state: >-
          {% set lst = [
            'binary_sensor.heating_valve_sklep_michal_alive',
            'binary_sensor.heating_valve_prizemi_michal_alive',
            'binary_sensor.heating_valve_prizemi_chodba_zachod_alive',
            'binary_sensor.heating_valve_1p_jidelna_alive',
            'binary_sensor.heating_valve_1p_kuchyn_alive',
            'binary_sensor.heating_valve_1p_koupelna_alive',
            'binary_sensor.heating_valve_1p_chodba_alive',
            'binary_sensor.heating_valve_2p_mama_alive'
          ] %}
          {{ lst | map('states') | select('eq', 'off') | list | count }}
        attributes:
          unhealthy_entities: >-
            {% set pairs = [
              ('Sklep – Michal', 'binary_sensor.heating_valve_sklep_michal_alive'),
              ('Přízemí – Michal', 'binary_sensor.heating_valve_prizemi_michal_alive'),
              ('Přízemí – Chodba záchod', 'binary_sensor.heating_valve_prizemi_chodba_zachod_alive'),
              ('1. patro – Jídelna', 'binary_sensor.heating_valve_1p_jidelna_alive'),
              ('1. patro – Kuchyň', 'binary_sensor.heating_valve_1p_kuchyn_alive'),
              ('1. patro – Koupelna', 'binary_sensor.heating_valve_1p_koupelna_alive'),
              ('1. patro – Chodba', 'binary_sensor.heating_valve_1p_chodba_alive'),
              ('2. patro – Máma', 'binary_sensor.heating_valve_2p_mama_alive')
            ] %}
            {% set out = namespace(items=[]) %}
            {% for p in pairs %}
              {% set label = p[0] %}
              {% set alive = p[1] %}
              {% if is_state(alive, 'off') %}
                {% set out.items = out.items + [
                  {
                    'zone': label,
                    'alive_entity': alive,
                    'alive_state': states(alive),
                    'last_changed': states[alive].last_changed|string
                  }
                ] %}
              {% endif %}
            {% endfor %}
            {{ out.items }}

automation:
  - alias: "Heating Watchdog – Hlavice unhealthy notifikace"
    id: heating_watchdog_connectivity
    mode: single
    triggers:
      - trigger: state
        id: sustained_problem
        entity_id: binary_sensor.heating_valves_all_healthy
        to: "off"
        for: "00:10:00"
      - trigger: time_pattern
        id: periodic_repeat
        minutes: "/10"
    conditions:
      - condition: template
        value_template: "{{ states('sensor.heating_valves_unhealthy_count') | int(0) > 0 }}"
    actions:
      - variables:
          count: "{{ states('sensor.heating_valves_unhealthy_count') | int(0) }}"
          items: "{{ state_attr('sensor.heating_valves_unhealthy_count', 'unhealthy_entities') | default([], true) }}"
      - service: persistent_notification.create
        data:
          notification_id: heating_watchdog_connectivity_unhealthy
          title: "Heating Watchdog – hlavice unhealthy"
          message: >-
            ⚠️ Detekováno {{ count }} problematických hlavic.
            Detail: {{ items }}
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.id == 'sustained_problem' }}"
            sequence:
              - service: notify.mobile_app_sm_s938b
                data:
                  message: >-
                    ⚠️ Heating watchdog: {{ count }} hlavice jsou unhealthy déle než 10 min.
      - service: logbook.log
        data:
          name: "Heating Watchdog – Hlavice"
          message: >-
            unhealthy_count={{ count }}, detail={{ items }}
          entity_id: sensor.heating_valves_unhealthy_count

  - alias: "Heating Watchdog – eskalace výpadku hlavic"
    id: heating_watchdog_connectivity_escalation
    mode: single
    triggers:
      - trigger: numeric_state
        entity_id: sensor.heating_valves_unhealthy_count
        above: 1
        for: "00:30:00"
    conditions:
      - condition: state
        entity_id: input_boolean.topny_system_enable
        state: "on"
    actions:
      - variables:
          items: "{{ state_attr('sensor.heating_valves_unhealthy_count', 'unhealthy_entities') | default([], true) }}"
      - service: persistent_notification.create
        data:
          notification_id: heating_watchdog_connectivity_escalation
          title: "Heating Watchdog – eskalace výpadku hlavic"
          message: >-
            🚨 Eskalace watchdogu: {{ states('sensor.heating_valves_unhealthy_count') }} hlavice unhealthy >= 30 min (bez zásahu do režimu/kotle).
            Detail: {{ items }}
      - service: logbook.log
        data:
          name: "Heating Watchdog – Hlavice eskalace"
          message: ">=2 unhealthy hlavice po 30 min. Pouze diagnostika, bez přepnutí režimu."
          entity_id: sensor.heating_valves_unhealthy_count

  - alias: "Heating Watchdog – clear notifikace hlavic"
    id: heating_watchdog_connectivity_clear
    mode: single
    triggers:
      - trigger: state
        entity_id: binary_sensor.heating_valves_all_healthy
        to: "on"
        for: "00:05:00"
    actions:
      - service: persistent_notification.dismiss
        data:
          notification_id: heating_watchdog_connectivity_unhealthy
      - service: persistent_notification.dismiss
        data:
          notification_id: heating_watchdog_connectivity_escalation
      - service: logbook.log
        data:
          name: "Heating Watchdog – Hlavice"
          message: "Všechny hlavice opět healthy (stabilní 5 min)."
          entity_id: sensor.heating_valves_unhealthy_count
