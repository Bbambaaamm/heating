# YAML 2024.10
# =====================================================================
# Soubor   : config/heating/control/reliability_failsafe.yaml
# Modul    : Topení – reliability fail-safe + watchdog
# Účel     : Reakce na výpadek helperů, restart během Boostu, health-check automací
# Autor    : Codex návrh
# Poslední úprava : 2026-04-06
# =====================================================================

template:
  - binary_sensor:
      - name: "heating_helpers_all_available"
        unique_id: heating_helpers_all_available
        device_class: connectivity
        state: >-
          {% set required = [
            'input_select.topny_rezim',
            'input_boolean.topny_system_enable',
            'input_number.eco_temp_default',
            'input_number.boost_minutes',
            'input_datetime.boost_until'
          ] %}
          {{ required
             | map('states')
             | select('in', ['unknown', 'unavailable', ''])
             | list
             | count == 0 }}

      - name: "heating_core_entities_available"
        unique_id: heating_core_entities_available
        device_class: connectivity
        state: >-
          {% set required = [
            'climate.sklep_michal',
            'climate.prizemi_michal',
            'climate.prizemi_chodba_zachod',
            'climate.1p_jidelna',
            'climate.1p_kuchyn',
            'climate.1p_koupelna',
            'climate.1p_chodba',
            'climate.2p_mama',
            'switch.kotel_rele_spinac'
          ] %}
          {{ required
             | map('states')
             | select('in', ['unknown', 'unavailable', ''])
             | list
             | count == 0 }}

      - name: "heating_core_automations_healthy"
        unique_id: heating_core_automations_healthy
        device_class: connectivity
        state: >-
          {% set required_ids = [
            'heating_boost_start',
            'heating_boost_apply_comfort_on',
            'heating_boost_reapply_schedule_off',
            'kotel_turn_on_by_policy',
            'kotel_turn_off_by_policy',
            'heating_startup_schedule_sync'
          ] %}
          {% set healthy_ids = states.automation
             | selectattr('attributes.id', 'defined')
             | selectattr('state', 'eq', 'on')
             | map(attribute='attributes.id')
             | list %}
          {{ required_ids | reject('in', healthy_ids) | list | count == 0 }}
        attributes:
          missing_ids: >-
            {% set required_ids = [
              'heating_boost_start',
              'heating_boost_apply_comfort_on',
              'heating_boost_reapply_schedule_off',
              'kotel_turn_on_by_policy',
              'kotel_turn_off_by_policy',
              'heating_startup_schedule_sync'
            ] %}
            {% set healthy_ids = states.automation
               | selectattr('attributes.id', 'defined')
               | selectattr('state', 'eq', 'on')
               | map(attribute='attributes.id')
               | list %}
            {{ required_ids | reject('in', healthy_ids) | list }}

automation:
  - id: heating_failsafe_helpers_unavailable
    alias: "Topení Fail-safe – helpery nedostupné => Eco"
    mode: single
    triggers:
      - trigger: state
        entity_id: binary_sensor.heating_helpers_all_available
        to: "off"
        for: "00:02:00"
    actions:
      - action: input_select.select_option
        target:
          entity_id: input_select.topny_rezim
        data:
          option: "Eco"
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.boost_now
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.boost_until
        data:
          datetime: "{{ now().isoformat() }}"
      - action: logbook.log
        data:
          name: "Topení Fail-safe"
          message: "Detekován výpadek klíčových helperů >2 min. Systém přepnut do Eco."
          entity_id: input_select.topny_rezim
      - action: persistent_notification.create
        data:
          title: "Topení fail-safe"
          message: "⚠️ Klíčové helpery byly nedostupné >2 min. Systém byl přepnut do Eco."

  - id: heating_startup_reconcile_boost
    alias: "Topení – po startu srovnat Boost"
    mode: single
    triggers:
      - trigger: homeassistant
        event: start
    actions:
      - delay: "00:00:20"
      - variables:
          boost_until_ts: "{{ as_timestamp(states('input_datetime.boost_until'), default=0) }}"
          boost_should_be_active: "{{ now().timestamp() < boost_until_ts }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ boost_should_be_active }}"
            sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.boost_now
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: input_boolean.heating_central_dispatch_enable
                        state: "on"
                    sequence:
                      - action: event.fire
                        data:
                          event_type: heating_reconcile_requested
                          event_data:
                            source: heating_startup_reconcile_boost
                            reason: startup_boost_still_active
                  - conditions:
                      - condition: state
                        entity_id: input_boolean.heating_central_dispatch_enable
                        state: "off"
                    sequence:
                      - variables:
                          boost_apply_automation: >-
                            {{ states.automation
                               | selectattr('attributes.id', 'eq', 'heating_boost_apply_comfort_on')
                               | map(attribute='entity_id')
                               | list
                               | first }}
                      - condition: template
                        value_template: "{{ boost_apply_automation is not none and boost_apply_automation != '' }}"
                      - action: automation.trigger
                        target:
                          entity_id: "{{ boost_apply_automation }}"
              - action: logbook.log
                data:
                  name: "Topení – startup reconcile"
                  message: "Boost byl po restartu stále aktivní, proběhla re-aplikace setpointů."
                  entity_id: input_datetime.boost_until

          - conditions:
              - condition: template
                value_template: "{{ not boost_should_be_active }}"
            sequence:
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.boost_now
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: input_select.topny_rezim
                        state: "Boost"
                    sequence:
                      - action: input_select.select_option
                        target:
                          entity_id: input_select.topny_rezim
                        data:
                          option: "Auto"

  - id: heating_failsafe_entities_unavailable
    alias: "Topení Fail-safe – klíčové entity nedostupné"
    mode: single
    triggers:
      - trigger: state
        entity_id: binary_sensor.heating_core_entities_available
        to: "off"
        for: "00:05:00"
    actions:
      - action: input_select.select_option
        target:
          entity_id: input_select.topny_rezim
        data:
          option: "Eco"
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.boost_now
      - action: switch.turn_off
        target:
          entity_id: switch.kotel_rele_spinac
      - action: logbook.log
        data:
          name: "Topení Fail-safe"
          message: "Klíčová entita nedostupná >5 min. Režim Eco + kotel vypnut (fail-safe)."
          entity_id: switch.kotel_rele_spinac
      - action: persistent_notification.create
        data:
          title: "Topení fail-safe"
          message: "⚠️ Některá klíčová entita je nedostupná >5 min. Kotel byl preventivně vypnut."

  - id: heating_watchdog_core_automations
    alias: "Heating Watchdog – zdraví klíčových automací"
    mode: single
    triggers:
      - trigger: time_pattern
        id: periodic_check
        minutes: "/15"
      - trigger: state
        id: unhealthy_5m
        entity_id: binary_sensor.heating_core_automations_healthy
        to: "off"
        for: "00:05:00"
    actions:
      - choose:
          - conditions:
              - condition: state
                entity_id: binary_sensor.heating_core_automations_healthy
                state: "off"
            sequence:
              - action: logbook.log
                data:
                  name: "Heating Watchdog"
                  message: "Některé klíčové automace jsou vypnuté nebo nefunkční."
                  entity_id: input_select.topny_rezim
              - action: persistent_notification.create
                data:
                  notification_id: heating_watchdog_core_automations_unhealthy
                  title: "Heating Watchdog"
                  message: "⚠️ Klíčové automace nejsou healthy. Zkontrolujte automation.*"
        default:
          - action: persistent_notification.dismiss
            data:
              notification_id: heating_watchdog_core_automations_unhealthy

  - id: heating_watchdog_periodic_reconcile
    alias: "Heating Watchdog – periodická reconciliace režimu"
    mode: single
    triggers:
      - trigger: time_pattern
        minutes: "/30"
    conditions:
      - condition: state
        entity_id: input_boolean.topny_system_enable
        state: "on"
      - condition: template
        value_template: "{{ states('input_select.topny_rezim') in ['Auto', 'Eco'] }}"
      - condition: state
        entity_id: binary_sensor.kotel_boost_active
        state: "off"
    actions:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.heating_central_dispatch_enable
                state: "on"
            sequence:
              - action: event.fire
                data:
                  event_type: heating_reconcile_requested
                  event_data:
                    source: heating_watchdog_periodic_reconcile
                    reason: periodic_safety_reconcile
          - conditions:
              - condition: state
                entity_id: input_boolean.heating_central_dispatch_enable
                state: "off"
            sequence:
              - action: automation.trigger
                target:
                  entity_id: >-
                    {{ states.automation
                      | selectattr('entity_id', 'search', '_bp$')
                      | map(attribute='entity_id')
                      | list }}
