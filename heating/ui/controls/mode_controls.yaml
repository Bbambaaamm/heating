# =====================================================================
# Soubor   : heating/ui/controls/mode_controls.yaml
# Modul    : Topení – UI ovládání
# Účel     : Napojení UI prvků na logiku režimu a časovačů
# Autor    : Michal
# Poslední úprava : 2026-04-10
# Poznámka : YAML syntaxe podle HA 2024.10 (trigger / condition / action)
# =====================================================================

input_select:
  topny_rezim:
    name: "Topení – režim"
    icon: mdi:home-thermometer-outline
    initial: Auto
    options:
      - Auto     # standardní režim
      - Eco      # úsporný režim (vyšší prahy, nižší komfort)
      - Boost    # krátkodobé intenzivní topení
      - "Off"      # úplné vypnutí systému


# =====================================================================
# 🔘 Přepínače (boolean helpers)
# =====================================================================
input_boolean:

  # ▶️ Ruční aktivace BOOStu
  boost_now:
    name: "Boost – zapnout nyní"
    icon: mdi:fire

  # ▶️ Hlavní povolení topného systému
  topny_system_enable:
    name: "Topení – povoleno"
    icon: mdi:power
    initial: on

  # ▶️ Volba ignorovat otevřená okna (globální override)
  kotel_ignore_open_windows:
    name: "Kotel – ignorovat otevřená okna"
    icon: mdi:window-open-variant
    initial: on


# =====================================================================
# 🔢 Číselné hodnoty (minuty Boostu, ECO teplota…)
# =====================================================================
input_number:

  # ⏱️ Délka Boostu v minutách
  boost_minutes:
    name: "Boost – délka (min)"
    min: 10
    max: 180
    step: 10
    unit_of_measurement: min
    icon: mdi:timer
    initial: 60

  # Comfort offset
  boost_comfort_offset_c:
    name: "Boost – comfort offset (°C)"
    min: 0
    max: 5
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer-plus
    initial: 1.0

  # 🌿 ECO cílová teplota
  eco_temp_default:
    name: "ECO teplota (°C)"
    min: 10
    max: 22
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:leaf
    initial: 15.0


# =====================================================================
# 🗓️ Pomocník – čas ukončení Boostu
# =====================================================================
input_datetime:
  boost_until:
    name: "Boost – platí do"
    has_date: true
    has_time: true
