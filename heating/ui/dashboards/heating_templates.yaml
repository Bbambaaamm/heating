# =====================================================================
# Soubor   : heating/ui/dashboards/heating_templates.yaml
# Modul    : Topení – dashboard šablony
# Účel     : Template entity a utility metry pro dashboard
# Autor    : Michal
# Poslední úprava : 2026-04-10
# Poznámka : YAML syntaxe podle HA 2024.10 (trigger / condition / action)
# =====================================================================

template:
  - sensor:

      # -----------------------------------------------------------------
      # 🏠 Sklep – Michal: aktuální teplota z hlavice z externího senzoru xiaomi
      # -----------------------------------------------------------------
      - name: "Sklep Michal – aktuální teplota"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        availability: >
          {{ not is_state('climate.sklep_michal', 'unavailable') }}
        state: >
          {{ state_attr('climate.sklep_michal', 'current_temperature') | float(0) }}

      # -----------------------------------------------------------------
      # 🏠 Přízemí – Michal: aktuální teplota z hlavice
      # -----------------------------------------------------------------
      - name: "Přízemí Michal – aktuální teplota"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        availability: >
          {{ not is_state('climate.prizemi_michal', 'unavailable') }}
        state: >
          {{ state_attr('climate.prizemi_michal', 'current_temperature') | float(0) }}

      # -----------------------------------------------------------------
      # 🏠 Přízemí – Chodba záchod: aktuální teplota z hlavice
      # -----------------------------------------------------------------
      - name: "Přízemí Chodba záchod – aktuální teplota"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        availability: >
          {{ not is_state('climate.prizemi_chodba_zachod', 'unavailable') }}
        state: >
          {{ state_attr('climate.prizemi_chodba_zachod', 'current_temperature') | float(0) }}

      # -----------------------------------------------------------------
      # 🏠 1. patro – Kuchyň: aktuální teplota z hlavice
      # -----------------------------------------------------------------
      - name: "1. patro - Kuchyň – aktuální teplota"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        availability: >
          {{ not is_state('climate.1p_kuchyn', 'unavailable') }}
        state: >
          {{ state_attr('climate.1p_kuchyn', 'current_temperature') | float(0) }}

      # -----------------------------------------------------------------
      # 🥘 1. patro – Jídelna: aktuální teplota z externího Zigbee senzoru
      # -----------------------------------------------------------------
      - name: "1. patro Jídelna – aktuální teplota"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        availability: >
          {{ not is_state('sensor.tz3000_jidelna_teplota', 'unavailable') }}
        state: >
          {{ states('sensor.tz3000_jidelna_teplota') | float(0) | round(1) }}

      # -----------------------------------------------------------------
      # 🥘 1. patro – Chodba: aktuální teplota z hlavice
      # -----------------------------------------------------------------
      - name: "1. patro Chodba – aktuální teplota"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        availability: >
          {{ not is_state('climate.1p_chodba', 'unavailable') }}
        state: >
          {{ state_attr('climate.1p_chodba', 'current_temperature') | float(0) }}

      # -----------------------------------------------------------------
      # 🥘 1. patro – Koupelna: aktuální teplota z hlavice
      # -----------------------------------------------------------------
      - name: "1. patro Koupelna – aktuální teplota"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        availability: >
          {{ not is_state('climate.1p_koupelna', 'unavailable') }}
        state: >
          {{ state_attr('climate.1p_koupelna', 'current_temperature') | float(0) }}

      # -----------------------------------------------------------------
      # 👩 2. patro – Máma: aktuální teplota z hlavice
      # -----------------------------------------------------------------
      - name: "2. patro Máma – aktuální teplota"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        availability: >
          {{ not is_state('climate.2p_mama', 'unavailable') }}
        state: >
          {{ state_attr('climate.2p_mama', 'current_temperature') | float(0) }}

      # -----------------------------------------------------------------
      # 🚨 BOOST – počet zón blokujících Boost (MANUÁL / override lock)
      # - počítá zóny z group.topne_zony, které mají input_boolean.<zone>_manual_override = on
      # - aktivní jen když je zapnutý Boost (binary_sensor.kotel_boost_active)
      # - atribut blocked_zones obsahuje seznam názvů (friendly_name) těchto zón
      # -----------------------------------------------------------------
      - name: "BOOST – blokované zóny (počet)"
        unique_id: boost_blocked_zones_count
        icon: mdi:alert-circle
        state: >
          {% set boost_on = is_state('binary_sensor.kotel_boost_active', 'on') %}
          {% if not boost_on %}
            0
          {% else %}
            {% set zones = state_attr('group.topne_zony', 'entity_id') | default([], true) %}
            {% set blocked = namespace(count=0) %}
            {% for z in zones %}
              {% set obj = z.split('.')[1] %}
              {% set helper = 'input_boolean.' ~ obj ~ '_manual_override' %}
              {% if states(helper) == 'on' %}
                {% set blocked.count = blocked.count + 1 %}
              {% endif %}
            {% endfor %}
            {{ blocked.count }}
          {% endif %}
        attributes:
          blocked_zones: >
            {% set boost_on = is_state('binary_sensor.kotel_boost_active', 'on') %}
            {% if not boost_on %}
              []
            {% else %}
              {% set zones = state_attr('group.topne_zony', 'entity_id') | default([], true) %}
              {% set names = namespace(list=[]) %}
              {% for z in zones %}
                {% set obj = z.split('.')[1] %}
                {% set helper = 'input_boolean.' ~ obj ~ '_manual_override' %}
                {% if states(helper) == 'on' %}
                  {% set names.list = names.list + [state_attr(z, 'friendly_name') | default(states[z].name, true)] %}
                {% endif %}
              {% endfor %}
              {{ names.list }}
            {% endif %}

input_boolean:

  ui_sklep_michal_schedule_expand:
    name: UI – Sklep Michal rozvrh rozbalit
    icon: mdi:unfold-more-horizontal

  ui_prizemi_michal_schedule_expand:
    name: UI – Přízemí Michal rozvrh rozbalit
    icon: mdi:unfold-more-horizontal

  ui_prizemi_chodba_zachod_schedule_expand:
    name: UI – Přízemí Chodba záchod rozvrh rozbalit
    icon: mdi:unfold-more-horizontal

  ui_1p_chodba_schedule_expand:
    name: UI – 1. patro Chodba rozvrh rozbalit
    icon: mdi:unfold-more-horizontal

  ui_1p_jidelna_schedule_expand:
    name: UI – 1. patro Jídelna rozvrh rozbalit
    icon: mdi:unfold-more-horizontal

  ui_1p_kuchyn_schedule_expand:
    name: UI – 1. patro Kuchyň rozvrh rozbalit
    icon: mdi:unfold-more-horizontal

  ui_1p_koupelna_schedule_expand:
    name: UI – 1. patro Koupelna rozvrh rozbalit
    icon: mdi:unfold-more-horizontal

  ui_2p_mama_schedule_expand:
    name: UI – 2. patro Máma rozvrh rozbalit
    icon: mdi:unfold-more-horizontal

  ui_global_manual_launcher:
    name: UI – Centrální manuál (launcher)
    icon: mdi:tune-variant
