# ---------------------------------------------------------------------
# Instanční automace blueprintu smart_zone_schedule
# Poznámka: Každá položka váže konkrétní zónu na helpery rozvrhu a override.
# ---------------------------------------------------------------------
- id: '1763973069444'
  alias: Rozvrh Přízemí - Michal (BP)
  description: ''
  use_blueprint:
    path: heating/smart_zone_schedule.yaml
    input:
      zone_name: Přízemí - Michal
      climate_entity: climate.prizemi_michal
      schedule_enable: input_boolean.schedule_enable_prizemi_michal
      last_comfort_helper: input_number.prizemi_michal_last_comfort
      eco_temp_default: input_number.eco_temp_default
      boost_active: binary_sensor.kotel_boost_active
      scheduler_entity: input_boolean.prizemi_michal_schedule_active
      manual_override_boolean: input_boolean.prizemi_michal_manual_override
      manual_override_timer: timer.prizemi_michal_manual_override
      manual_override_type: input_select.prizemi_michal_manual_override_type
