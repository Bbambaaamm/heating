# ---------------------------------------------------------------------
# Instanční automace blueprintu danfoss_external_sensor
# Poznámka: Zajišťuje přepis externí teploty do Danfoss hlavic.
# ---------------------------------------------------------------------
- id: '1764976713111'
  alias: Externí sensor - 1.P - Jídelna
  description: ''
  use_blueprint:
    path: heating/danfoss_external_sensor.yaml
    input:
      zone_name: 1. patro - Jídelna
      source_temp_sensor: sensor.tz3000_jidelna_teplota
      danfoss_external_temp_number: number.1p_jidelna_senzor_externi_teploty
      danfoss_prefer_external_switch: switch.1p_jidelna_uprednostnit_externi_teplotni_senzor
- id: '1764976820265'
  alias: Externí sensor - Sklep - Michal
  description: ''
  use_blueprint:
    path: heating/danfoss_external_sensor.yaml
    input:
      zone_name: Sklep - Michal
      source_temp_sensor: sensor.mi_air_purifier_2h_teplota
      danfoss_external_temp_number: number.sklep_michal_senzor_externi_teploty
      danfoss_prefer_external_switch: switch.sklep_michal_uprednostnit_externi_teplotni_senzor
- id: '1771525903912'
  alias: 'Přítomnost Mámy '
  description: ''
  # -------------------------------------------------------------------
  # Logika spuštění automace
  # - reaguje na vstup sledovaného zařízení do zóny Home
  # -------------------------------------------------------------------
  trigger:
  - device_id: 7f7e7655eb51a2b8bcf3e7353a846706
    domain: device_tracker
    entity_id: cbc610fbc9f2421851d9a6726d9a192f
    type: enters
    metadata:
      secondary: true
    trigger: device
    zone: zone.home
  condition: []
  # -------------------------------------------------------------------
  # Finální akce
  # - odeslání notifikace při příjezdu
  # -------------------------------------------------------------------
  action:
  - action: notify.notify
    metadata: {}
    data:
      message: Máma je doma
  mode: single

- id: '1776000000001'
  alias: Export entit do snapshotu
  description: >-
    Pravidelně ukládá snapshot entit do /config/analysis/entities_snapshot.json
    bez Git operací (commit/push běží mimo HA runtime).
  trigger:
  - platform: homeassistant
    event: start
  - platform: time_pattern
    minutes: "/30"
  condition: []
  action:
  - action: shell_command.export_entities_snapshot
    data: {}
  mode: single
