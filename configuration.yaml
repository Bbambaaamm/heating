# =====================================================================
# Soubor   : configuration.yaml
# Modul    : Hlavní konfigurace
# Účel     : Centrální načtení balíčků, integrací a základních YAML částí
# Autor    : Michal
# Poslední úprava : 2026-04-10
# Poznámka : YAML syntaxe podle HA 2024.10 (trigger / condition / action)
# =====================================================================

# 🧩 Načte všechny výchozí integrace Home Assistanta
default_config:  # ⚙️ Neodstraňovat — zajišťuje fungování základních funkcí (UI, zařízení, atd.)

# 🎨 Načítá motivy (themes) ze složky "themes"
frontend:
  themes: !include_dir_merge_named themes  # 🔹 umožní přidávat vlastní barevné motivy pro frontend

# ⚙️ Odkazy na samostatné soubory s automatizacemi, skripty a scénami
automation: !include automations.yaml  # 📜 všechny automatizace
script: !include scripts.yaml           # ▶️ uživatelské skripty
scene: !include scenes.yaml             # 💡 scény (např. večerní režim, filmový režim apod.)

# 📍 Device Tracker – sledování přítomnosti zařízení (např. telefonů)
device_tracker: []
#  - platform: bluetooth_le_tracker      # 🔹 sleduje zařízení pomocí BLE (Bluetooth Low Energy)
#    track_new_devices: true             # 🔸 automaticky přidává nová zařízení
#    consider_home: 180                  # ⏱️ zařízení zůstává „doma“ ještě 180 s po ztrátě signálu
#  - platform: bluetooth_tracker         # 🔹 klasický Bluetooth (ne BLE)
#    interval_seconds: 30                # 🔸 interval skenování v sekundách
#    request_rssi: true                  # 📶 zaznamenává i sílu signálu (užitečné pro přesnost)

# 🌡️ Integrace topení – načte všechny konfigurační soubory ze složky "heating"
homeassistant:
  packages: !include_dir_named heating

# 🐚 Shell příkazy dostupné z automací
shell_command:
  export_entities_snapshot: /config/scripts/export_entities_to_git.sh
