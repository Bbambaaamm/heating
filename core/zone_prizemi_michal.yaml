# =====================================================================
# 🧩 ZÓNA: Přízemí – Michal
# - Požadavek (0–100 %) z hlavice Danfoss (pi_heating_demand)
# - Okno: cokoliv mimo "Closed" bereme jako otevřené
# - Zóna aktivní jen když chce teplo a není otevřené okno
# =====================================================================

template:
  # ---- Senzory (požadavek) ---------------------------------------------------
  - sensor:
      - name: "zona_prizemi_michal_demand" # 0–100 % požadavku
        unit_of_measurement: "%"
        state_class: measurement
        state: "{{ state_attr('climate.prizemi_michal', 'pi_heating_demand') | int(0) }}"

  # ---- Binární senzory (okno + aktivita) ------------------------------------
  - binary_sensor:
      - name: "zona_prizemi_michal_okno_otevrene" # on = okno otevřené
        device_class: opening
        state: >
          {% set s = states('sensor.prizemi_michal_detekovano_otevrene_okno') %}
          {{ s is not string or s|lower != 'closed' }}

      - name: "zona_prizemi_michal_aktivni" # on = reálná poptávka zóny
        state: >
          {{ (states('sensor.zona_prizemi_michal_demand')|int(0) > 0)
             and (not is_state('binary_sensor.zona_prizemi_michal_okno_otevrene','on')) }}
